services:
  finance-web:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    networks:
      - coolify
    volumes:
      # Bind-mount of finance-bot's Coolify-managed Docker volume.
      # Both apps reach the same SQLite file; WAL mode (set by the bot) handles
      # concurrent reads + writes. The web is the second writer as of W4.
      - /var/lib/docker/volumes/h84occok4wk4gs4888woc8kc_finance-bot-data/_data:/app/data

networks:
  coolify:
    external: true
    name: coolify
